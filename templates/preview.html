<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Preview - NovaShare</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* ================= BODY ================= */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background: linear-gradient(135deg, #1c1c1c, #2a2a2a, #3a3a3a);
    color:white;
}

/* ================= MAIN CARD ================= */
.container{
    width:100%;
    max-width:420px;
    padding:25px;

    border-radius:20px;
    text-align:center;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    border:1px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ================= TITLE ================= */
.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;

    background: linear-gradient(90deg, #00c6ff, #0072ff);
    background-clip: text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:13px;
    color:#aaa;
    margin-bottom:20px;
}

/* ================= PREVIEW BOX ================= */
.preview-box{
    margin-top:15px;
    padding:15px;
    border-radius:15px;

    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

/* ================= IMAGE PREVIEW ================= */
.preview-img{
    width:100%;
    max-height:300px;
    object-fit:contain;
    border-radius:12px;
    margin-top:10px;
    background:white;
    padding:8px;
}

/* ================= BUTTON ================= */
.btn{
    display:block;
    width:100%;
    margin-top:12px;
    padding:12px;

    border:none;
    border-radius:12px;
    text-decoration:none;
    cursor:pointer;

    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color:white;
    font-size:15px;

    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

/* ================= BACK BUTTON ================= */
.back-btn{
    background: linear-gradient(135deg, #ff4d4d, #cc0000);
}

/* ================= MOBILE ================= */
@media(max-width:500px){
    .container{
        width:95%;
        padding:20px;
    }

    .title{
        font-size:20px;
    }
}

</style>
</head>
<body>

<div class="container">

    <h2 class="title">📄 File Preview</h2>
    <p class="subtitle">Preview your uploaded file</p>

    <div class="preview-box">

        {% if file_type == "image" %}
            <p>🖼 Image Preview</p>
            <img src="{{ file_url }}" class="preview-img">

        {% elif file_type == "pdf" %}
            <p>📕 PDF Preview</p>
            <a href="{{ file_url }}" target="_blank" class="btn">
                Open PDF
            </a>

        {% else %}
            <p>📁 File uploaded successfully</p>
            <a href="{{ file_url }}" target="_blank" class="btn">
                Open File
            </a>
        {% endif %}

    </div>

    <a href="/" class="btn">⬅ Back to Home</a>

</div>

</body>
</html>
