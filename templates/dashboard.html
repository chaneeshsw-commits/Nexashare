<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - NovaShare</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    text-align:center;
    backdrop-filter:blur(12px);
}

h2{
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    color:#ccc;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    cursor:pointer;
    font-size:15px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
}
</style>
</head>
<body>

<div class="box">
    <h2>👋 Welcome to NovaShare</h2>

    <div class="info" id="userName"></div>
    <div class="info" id="userEmail"></div>

    <button class="btn" onclick="logout()">
        Logout
    </button>
</div>








<script>
document.getElementById("userName").innerText =
    "Name: " + localStorage.getItem("userName");

document.getElementById("userEmail").innerText =
    "Email: " + localStorage.getItem("userEmail");

function logout(){
    localStorage.clear();
    window.location.href = "/";
}
</script>

</body>
</html>
