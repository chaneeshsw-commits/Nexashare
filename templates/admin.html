<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h1>Admin Dashboard</h1>
{% for item in uploads %}
<div class="file-card">
<p>{{ item.filename }}</p>
<p>Views: {{ item.views }}</p>
<p>Downloads: {{ item.downloads }}</p>
<a href="/delete/{{ item.id }}">Delete</a>
</div>
{% endfor %}
</div>
</body>
</html>
