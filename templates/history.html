<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File History - NovaShare</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background: linear-gradient(135deg, #1c1c1c, #2a2a2a, #3a3a3a);
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:20px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.file-card{
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    backdrop-filter: blur(10px);
}

.file-name{
    font-size:16px;
    margin-bottom:8px;
    word-break:break-all;
}

.file-time{
    font-size:12px;
    color:#aaa;
    margin-bottom:10px;
}

.btn{
    display:inline-block;
    padding:8px 14px;
    margin-right:10px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
}

.delete-btn{
    background: linear-gradient(135deg, #ff4d4d, #cc0000);
}
</style>
</head>
<body>

<div class="container">

    <h2>📦 File History</h2>

    {% for file in files %}
    <div class="file-card">

        <div class="file-name">
            {{ file.name }}
        </div>

        <div class="file-time">
            🕒 {{ file.time }}
        </div>

        <a href="/uploads/{{ file.name }}" target="_blank" class="btn">
            📂 Open
        </a>

        <a href="/delete/{{ file.name }}" class="btn delete-btn">
            🗑 Delete
        </a>

    </div>
    {% endfor %}

    <div style="text-align:center; margin-top:20px;">
        <a href="/" class="btn">⬅ Back Home</a>
    </div>

</div>

</body>
</html>
