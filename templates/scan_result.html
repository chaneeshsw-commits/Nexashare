<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaShare - Scanned Files</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.4rem;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #00d4ff, #5b8bf5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: rgba(255,255,255,0.9);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .file-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-name {
            font-size: 1rem;
            word-break: break-word;
            text-align: left;
            flex: 1;
        }

        .btn {
            border: none;
            padding: 12px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .download-btn {
            background: linear-gradient(45deg, #00d4ff, #5b8bf5);
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 30px;
        }

        .empty {
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 2rem;
            }

            .box {
                padding: 20px;
            }

            .file-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .file-name {
                text-align: center;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Scanned Files</h1>

    <div class="box">
        <div class="subtitle">Files received from scanned QR code</div>

        {% if files and files|length > 0 %}
            <div class="file-list">
                {% for file in files %}
                    <div class="file-item">
                        <div class="file-name">📄 {{ file }}</div>
                        <a href="/uploads/{{ file }}" class="btn download-btn" download>
                            Download
                        </a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="empty">No files found ❌</div>
        {% endif %}

        <a href="/" class="btn back-btn">⬅ Back to Home</a>
    </div>
</div>

</body>
</html>
