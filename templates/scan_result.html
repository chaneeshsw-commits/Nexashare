<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Result - NovaShare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📦 Scan Result</h1>
    <p>Files found successfully</p>

    <div class="card">

        <button onclick="toggleFiles()" class="share-btn">
            More Files
        </button>

        <div id="filesList" style="display:none; margin-top:20px;">

            {% for file in files %}
            <div class="file-card">
                <p>{{ file.filename }}</p>

                <a href="/preview/{{ file.filename }}"
                   class="share-btn">
                   Preview
                </a>
            </div>
            {% endfor %}

        </div>

        <br><br>

        <a href="/download-all/{{ code }}"
           class="share-btn">
           Download All Files
        </a>

    </div>

</div>

<script>
function toggleFiles() {
    let files = document.getElementById("filesList");

    if (files.style.display === "none") {
        files.style.display = "block";
    } else {
        files.style.display = "none";
    }
}
</script>

</body>
</html>
