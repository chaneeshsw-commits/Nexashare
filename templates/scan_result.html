<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files Access - NexaShare</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- =========================================
         Header
    ========================================== -->

    <div class="main-title">
        <h1>📦 Shared Files</h1>
        <p>Securely preview and access all uploaded files</p>
    </div>

    <!-- =========================================
         Main Card
    ========================================== -->

    <div class="card">

        <h2>Available Files</h2>
        <p>Preview files before downloading</p>

        <!-- More Files Section -->

        {% for file in files %}

        <div class="file-card">

            <div class="file-name">
                📄 {{ file.filename }}
            </div>

            <!-- Preview Button -->
            <a
                href="{{ url_for('preview', filename=file.filename) }}"
                class="btn"
            >
                Preview
            </a>

        </div>

        {% endfor %}

        <!-- Download All Button -->

        <a
            href="{{ url_for('download_all', code=code) }}"
            class="btn"
        >
            Download All Files
        </a>

    </div>

    <!-- Footer -->

    <div class="footer">
        <p>© 2026 NexaShare — Premium Secure File Sharing</p>
    </div>

</div>

</body>
</html>
