<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShare</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
<div class="container">
    <h1>📦 NovaShare</h1>
    <p>Next Gen QR File Sharing System</p>

    <form action="/upload" method="POST" enctype="multipart/form-data" class="card">
        <input type="file" name="files" multiple required>
        <input type="password" name="password" placeholder="Optional Password">
        <select name="expiry">
            <option value="0">Never Expire</option>
            <option value="1">1 Day</option>
            <option value="3">3 Days</option>
            <option value="7">7 Days</option>
            <option value="30">30 Days</option>
        </select>
        <button type="submit">Upload + Generate QR</button>
    </form>

    <div class="card">
        <h2>Scan QR</h2>
        <div id="reader"></div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
