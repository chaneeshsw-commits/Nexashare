<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaShare - QR File Sharing</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00d4ff, #5b8bf5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-area, .qr-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .upload-area:hover, .qr-section:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .upload-area.dragover { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; }

        .upload-icon { font-size: 4rem; margin-bottom: 20px; background: linear-gradient(45deg, #00d4ff, #5b8bf5); 
            -webkit-background-clip: text;
             -webkit-text-fill-color: transparent; 
             background-clip: text;
             }

        .btn {
            background: linear-gradient(45deg, #00d4ff, #5b8bf5);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
            display: inline-block;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        .btn-qr-generate { background: linear-gradient(45deg, #ff6b6b, #ff8e8e); margin-top: 15px; }

        .qr-generate-section {
            display: none;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid rgba(255, 107, 107, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        #qrCanvas { border-radius: 15px; box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3); margin-top: 15px; }

        /* QR Scanner */
        .qr-scanner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .qr-scanner-modal.active { display: flex; }

        .qr-scanner-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        #qrVideo { width: 100%; max-width: 350px; border-radius: 20px; background: #000; margin: 20px 0; }

        .scanner-close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .scanner-close-btn:hover { background: #ff4444; transform: translateX(-50%) scale(1.05); }

        .progress-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            display: none;
        }

        .progress-bar {
            width: 100%; height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #5b8bf5);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: 200px 0; }
        }

        /* Share Popup */
        .share-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1001;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 300px;
            width: 90vw;
        }

        .share-popup.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .share-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .share-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .share-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-size: 1.5rem;
        }

        .share-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .share-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .share-option:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 NovaShare</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h3>Drop files here or click to upload</h3>
            <button class="btn" onclick="uploadFiles()">Upload Files</button>
            <button class="btn" onclick="pasteFromClipboard()">Paste Files</button>
            <button class="btn btn-secondary"
        id="convertQrBtn"
        onclick="convertFiles()"
        style="display:none;">
    🔄 Convert QR
</button>
            
            
            
            <div class="qr-generate-section" id="qrGenerateSection">
                <h4>📲 Your Share QR Code</h4>
                <canvas id="qrCanvas"></canvas>
                <button class="btn btn-qr-generate" onclick="downloadQR()">Download QR</button>
            </div>
        </div>

        <div class="qr-section">
            <h3>📱 Scan QR to Receive</h3>
            <button class="btn" onclick="openQRScanner()">Open QR Scanner</button>
        </div>

        <div class="progress-section" id="progressSection">
            <h3>📊 Upload Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">0%</p>
        </div>
    </div>


<div id="fileInfo" style="
    display:none;
    margin-top:20px;
    padding:15px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    text-align:center;
">
    📦 Files Uploaded: <span id="fileCount">0</span>
</div>




    <!-- QR Scanner Modal -->
    <div class="qr-scanner-modal" id="qrScannerModal">
        <div class="qr-scanner-content">
            <h2>📱 QR Scanner Active</h2>
            <video id="qrVideo" autoplay playsinline></video>
            <p>Position QR code in frame</p>
            <button class="btn" onclick="uploadQrFile()">📁 Upload QR File</button>
            <button class="scanner-close-btn" onclick="closeQRScanner()">Close Scanner</button>
        </div>
    </div>

   






    <script>
        
let selectedFiles = [];

let sessionId = "";
let currentShareUrl = "";

/* ================= FILE PICK ================= */


/* ================= DRAG DROP ================= */
const uploadArea = document.getElementById("uploadArea");

uploadArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadArea.classList.add("dragover");
});

uploadArea.addEventListener("dragleave", () => {
    uploadArea.classList.remove("dragover");
});

uploadArea.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadArea.classList.remove("dragover");

    selectedFiles = Array.from(e.dataTransfer.files);

    document.getElementById("fileInfo").style.display = "block";
    document.getElementById("fileCount").innerText = selectedFiles.length;

    // ✅ SHOW BUTTON HERE ALSO
    document.getElementById("convertQrBtn").style.display = "inline-block";
});

/* ================= CONVERT QR ================= */
    
    



async function convertFiles() {

    if (!selectedFiles || selectedFiles.length === 0) {
        alert("No files selected ❌");
        return;
    }

    let formData = new FormData();

    for (let f of selectedFiles) {
        formData.append("files", f);
    }

    // STEP 1 → upload files
    let uploadRes = await fetch("/upload_files", {
        method: "POST",
        body: formData
    });

    let uploadData = await uploadRes.json();

    if (!uploadData.success) {
        alert("Upload failed ❌");
        return;
    }

    sessionId = uploadData.session_id;

    // STEP 2 → convert route call
    let convertRes = await fetch("/convert", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            session_id: sessionId
        })
    });

    let convertData = await convertRes.json();

    if (convertData.success) {
        // FINAL redirect
        window.location.href = "/share/" + convertData.share_id;
    } else {
        alert("Convert failed ❌");
    }
}





        // Progress
        function showProgress() { document.getElementById('progressSection').style.display = 'block'; }
        function hideProgress() { document.getElementById('progressSection').style.display = 'none'; }
        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = Math.round(percent) + '%';
        }

        // QR Scanner
        
let mediaStream = null;

async function startCamera() {
    try {
        const video = document.getElementById("qrVideo");

        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: {
                    ideal: "environment"
                }
            },
            audio: false
        });

        video.srcObject = mediaStream;

        await video.play();

        console.log("Camera started ✅");

    } catch (error) {
        console.log(error);
        alert("Camera access failed ❌ Please allow camera permission.");
    }
}

function openQRScanner() {
    document.getElementById("qrScannerModal").classList.add("active");
    startCamera();
}

function closeQRScanner() {
    document.getElementById("qrScannerModal").classList.remove("active");

    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }

    const video = document.getElementById("qrVideo");
    video.srcObject = null;
}





       
        

        

/* ================= UPLOAD BUTTON ================= */function uploadFiles() {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;

    input.onchange = (e) => {
        selectedFiles = e.target.files;

        document.getElementById('fileInfo').style.display = 'block';
        document.getElementById('fileCount').innerText = selectedFiles.length;

        document.getElementById('convertQrBtn').style.display = 'inline-block';
    };

    input.click();
}

/* ================= PASTE (SAFE VERSION) ================= */
async function pasteFromClipboard() {
    try {
        const items = await navigator.clipboard.read();

        const files = [];

        for (const item of items) {
            for (const type of item.types) {
                if (type.startsWith("image/")) {
                    const blob = await item.getType(type);
                    files.push(new File([blob], "paste.png", { type }));
                }
            }
        }

        if (files.length > 0) {
            handleUpload(files);
        } else {
            alert("No image in clipboard ❌");
        }

    } catch (e) {
        alert("Clipboard not supported ❌");
        console.log(e);
    }
}

/* ================= UPLOAD HANDLER ================= */
async function handleUpload(files) {

    let formData = new FormData();

    for (let f of files) {
        formData.append("files", f);
    }

    let res = await fetch("/upload_files", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    console.log(data);

    if (data.success) {
        sessionId = data.session_id;
        alert("Uploaded " + data.count + " files ✅");

        document.getElementById("convertQrBtn").style.display = "inline-block";
    } else {
        alert("Upload failed ❌");
    }
}


/* scnner file uplode*/
function uploadQrFile() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = async function (e) {
        const file = e.target.files[0];
        if (!file) return;

        let formData = new FormData();
        formData.append("qr_file", file);

        let res = await fetch("/scan_qr_upload", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if (data.success) {
            window.location.href = "/scan-result/" + data.share_id;
        } else {
            alert("Invalid QR Code ❌");
        }
    };

    input.click();
}






/* home add */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    .then(() => console.log("SW Registered"))
    .catch(err => console.log("SW Failed", err));
}
</script>
</body>
</html>
