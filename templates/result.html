<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShare Result</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
    min-height:100vh;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:800px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:40px;
    text-align:center;
}

/* TITLE */
h1{
    font-size:2rem;
    margin-bottom:25px;
    background: linear-gradient(45deg,#00d4ff,#5b8bf5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

/* QR IMAGE */
.qr-image{
    width:260px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow: 0 10px 30px rgba(0,212,255,0.2);
}

/* BUTTON */
.btn{
    background: linear-gradient(45deg,#00d4ff,#5b8bf5);
    border:none;
    padding:14px 28px;
    border-radius:50px;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

.btn:hover{
    transform: translateY(-2px);
}

/* PREVIEW BOX */
.preview-box{
    margin-top:30px;
    display:none;
    text-align:left;
}

.file-item{
    background: rgba(255,255,255,0.08);
    padding:14px;
    border-radius:14px;
    margin:10px 0;
}

.file-item a{
    color:white;
    text-decoration:none;
}

/* SHARE BUTTON */
.share-btn{
    position:fixed;
    right:30px;
    bottom:30px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:22px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    color:white;
    transition:0.3s;
}

.share-btn:hover{
    transform: scale(1.1);
}

/* MOBILE */
@media (max-width: 768px) {

    .container{
        width:100%;
        padding:10px;
    }

    .card{
        padding:25px 15px;
        border-radius:20px;
    }

    h1{
        font-size:1.6rem;
    }

    .qr-image{
        width:220px;
        max-width:90%;
    }

    .btn{
        width:100%;
        margin:8px 0;
        padding:14px;
        font-size:15px;
    }

    .file-item{
        padding:12px;
        font-size:14px;
        word-break:break-word;
    }

    .share-btn{
        width:55px;
        height:55px;
        right:20px;
        bottom:20px;
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>📲 Your QR Code</h1>

        <!-- QR IMAGE -->
        <img src="/static/qr.png" class="qr-image" id="qrImage">

        <br>

        <!-- DOWNLOAD -->
        <a href="/static/qr.png" download="NovaShare_QR.png">
            <button class="btn">⬇ Download</button>
        </a>

        <!-- PREVIEW -->
        <button class="btn" onclick="togglePreview()">👁 Preview Files</button>

        <!-- BACK -->
        <button class="btn" onclick="goBack()">⬅ Back</button>

        <!-- FILE PREVIEW -->
        <div class="preview-box" id="previewBox">

            <h3>Uploaded Files</h3>

            {% for file in files %}
            <div class="file-item">
                <a href="/uploads/{{ file }}" target="_blank">
                    📄 {{ file }}
                </a>
            </div>
            {% endfor %}

        </div>

    </div>
</div>

<!-- SHARE BUTTON -->
<button class="share-btn" id="shareBtn">↗️</button>

<script>

/* TOGGLE PREVIEW */
function togglePreview() {
    const box = document.getElementById("previewBox");
    box.style.display = (box.style.display === "block") ? "none" : "block";
}

/* SHARE BUTTON */
document.getElementById("shareBtn").addEventListener("click", async function () {

    try {
        const response = await fetch("/static/qr.png");
        const blob = await response.blob();

        const file = new File([blob], "NovaShare_QR.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {

            await navigator.share({
                title: "NovaShare QR",
                text: "Scan this QR Code",
                files: [file]
            });

        } else {

            const qrUrl = window.location.origin + "/static/qr.png";
            await navigator.clipboard.writeText(qrUrl);
            alert("QR link copied ✅");

        }

    } catch (error) {
        console.log(error);
        alert("Share failed ❌");
    }
});

/* BACK */
function goBack() {
    window.location.href = "/";
}

</script>

</body>
</html>
