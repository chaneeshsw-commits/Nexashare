<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generated - NexaShare</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- =========================================
         Header
    ========================================== -->

    <div class="main-title">
        <h1> QR Generated Successfully</h1>
        <p>Your files are ready to share securely</p>
    </div>

    <!-- =========================================
         Main Card
    ========================================== -->

    <div class="card">

        <h2>Scan This QR Code</h2>
        <p>Share this QR code to allow secure file access</p>

        <!-- QR Code -->

        <div class="qr-box">
            <img
                src="{{ url_for('static', filename=code + '.png') }}"
                alt="QR Code"
            >
        </div>

        <!-- Download QR -->

        <a
            href="{{ url_for('static', filename=code + '.png') }}"
            download
            class="btn"
        >
            Download QR Code
        </a>

        <!-- See Uploaded Files -->

        <a
            href="{{ url_for('result', code=code) }}"
            class="btn btn-dark"
        >
            See Uploaded Files
        </a>

        <!-- Download All Files -->

        <a
            href="{{ url_for('download_all', code=code) }}"
            class="btn"
        >
            Download All Files
        </a>

        <!-- Copy Link -->

        <button
            class="btn btn-dark"
            onclick="copyQRLink()"
        >
            Copy Link
        </button>

        <!-- Share QR -->

        <button
            class="btn btn-dark"
            onclick="shareQR()"
        >
            Share QR Code
        </button>

    </div>

    <!-- Footer -->

    <div class="footer">
        <p>© 2026 NexaShare — Premium Secure File Sharing</p>
    </div>

</div>

<script>
const qrPageLink = "{{ request.host_url }}result/{{ code }}";

/* Copy Link */

function copyQRLink() {
    navigator.clipboard.writeText(qrPageLink)
        .then(() => {
            alert("Link copied successfully!");
        })
        .catch(() => {
            alert("Copy failed");
        });
}

/* Share QR */

function shareQR() {
    if (navigator.share) {
        navigator.share({
            title: "NexaShare File Access",
            text: "Access shared files securely using this link",
            url: qrPageLink
        });
    } else {
        alert("Sharing not supported on this device");
    }
}
</script>

</body>
</html>
