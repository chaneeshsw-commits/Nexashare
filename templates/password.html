<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected - NexaShare</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- =========================================
         Header
    ========================================== -->

    <div class="main-title">
        <h1>🔒 Protected Files</h1>
        <p>This shared link is secured with password protection</p>
    </div>

    <!-- =========================================
         Password Card
    ========================================== -->

    <div class="card">

        <h2>Enter Access Password</h2>
        <p>Please enter the correct password to unlock files</p>

        <form method="POST">

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Unlock Files
            </button>

        </form>

        {% if error %}
            <p class="error-text">
                {{ error }}
            </p>
        {% endif %}

    </div>

    <!-- Footer -->

    <div class="footer">
        <p>© 2026 NexaShare — Premium Secure File Sharing</p>
    </div>

</div>

</body>
</html>
